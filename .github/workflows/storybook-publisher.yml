name: Storybook Publisher
on:
  push:
    branches:
      - dev
    paths:
      - 'src/component-library/**'
concurrency:
  group: chromatic
  cancel-in-progress: true
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'

      - name: Print npm version
        run: npm -v
        
      - name: Install dependencies
        run: npm ci

      - name: Publish storybook to Chromatic
        run: npm run component-library:storybook:publish

      - name: Disable workflow
        run: gh workflow disable "Storybook Publisher"
        env:          
          STORYBOOK_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}

