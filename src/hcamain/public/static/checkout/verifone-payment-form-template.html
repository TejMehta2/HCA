<style type="text/css">
    body,
    p,
    input,
    label {
        font-size: 20px;
    }

        input.form-control {
            font-size: 20px;
            border: 1px solid #707070;
        }

        body .m-template {
            background-color: #ffffff;
        }

        body .m-template__body {
            max-width: 960px;
            margin: 0 auto;
        }

    form,
    .m-trx__meta.details {
        border-top: 1px solid #b2b5b8;
    }

    .m-template .m-trx {
        border: 0;
        padding: 0;
        position: relative;
    }

    #amount {
        font-weight: 600;
        font-size: 38px;
    }

    .m-template #_card_container #_submit_button {
        background: #08394a;
        color: #ffffff;
        font-size: 20px;
        font-weight: 600;
        display: flex;
        justify-content: center;
        width: auto;
        height: auto;
        line-height: normal;
        align-items: center;
        min-height: 50px;
        padding: 0.5em 2em;
        margin-top: 60px;
    }

    #_card_container_row1,
    #_card_container_row2 {
        max-width: 66%;
    }

    #_card_container_row1 {
        margin-left: 0 !important;
        margin-right: 0 !important;
    }

    ::placeholder {
        color: #b2b5b8 !important;
        opacity: 1;
    }

    :-ms-input-placeholder {
        color: #b2b5b8 !important;
    }

    ::-ms-input-placeholder {
        color: #b2b5b8 !important;
    }

    #_main_container > div:first-child {
        padding-top: 50px;
    }

    .m-trx__meta.details {
        padding: 50px 0;
        margin: 0;
    }

        .m-trx__meta.details p {
            margin: 0;
            padding-bottom: 60px;
        }

            .m-trx__meta.details p:last-child {
                padding-bottom: 0;
            }

        .m-trx__meta.details label {
            font-size: 20px;
            font-weight: bold;
            color: #323232;
        }

    .m-trx__amt {
        position: absolute;
        right: 0;
        top: 45px;
    }

    #_card_number_label {
        margin-bottom: 45px;
        padding: 0;
        margin-left: 0;
        margin-right: 0;
    }

    .m-template img {
        display: inline-block;
        margin-left: -45px;
        margin-bottom: 8px;
    }

    .jc-cardNumberLabel, .jc-expiryLabel, .jc-cvvLabel {
        border: 0 !important
    }


    @media only screen and (max-device-width: 992px) {
        body .m-template__body {
            padding: 100px 40px;
        }

        .m-template #_card_container #_submit_button {
            width: 100%;
        }

        #_card_container_row1,
        #_card_container_row2 {
            max-width: 100%;
        }
    }
</style>
