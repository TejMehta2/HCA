  Hint: ComponentQuery
  Value: |
    query GetMainNavigation($datasource: String!, $language: String!) {
      item(path: $datasource, language: $language) {
        ... on MainNavigation {
          logo {
            value
            jsonValue
          }
          darkLogo {
            value
            jsonValue
          }
          primaryComplementaryLinksFolder {
            targetItem {
              ...NavigationLinksListFragment
            }
          }
          secondaryComplementaryLinksFolder {
            targetItem {
              ...NavigationLinksListFragment
            }
          }
          navigationTabs {
            targetItems {
              ... on NavigationTab {
                tabTitle {
                  value
                  jsonValue
                }
                tabTitle {
                  value
                  jsonValue
                }
                tabCta {
                  value
                  jsonValue
                }
                mobileTabCta {
                  value
                  jsonValue
                }
                hasChildren
                children {
                  results {
                    template {
                      name
                    }
                    ...NavigationContentBlockFragment
                    ...NavigationBlogPostCardFragment
                    ...MainNavigationLinksListFragment
                  }
                }
              }
            }
          }
          searchModalConfigurationFolder{
            targetItem{
              ... on SearchModalConfiguration{
                popularSearches{
                  targetItems{
                    ... on SearchSuggestionTemplate{
                      text{value jsonValue}
                      icon_612e35f92c594aa38a0fcb132fc6376b{value jsonValue}
                    }
                  }
                }
              }
            }
          }
          
    
        }
        
      }
    }
    
    fragment MainNavigationLinksListFragment on MainNavigationLinksList {
      title {
        value
        jsonValue
      }
      cta {
        value
        jsonValue
      }
      mobileCtaText {
        value
        jsonValue
      }
      variant {
        targetItem {
          ...GenericSettingVariant
        }
      }
      children {
        results {
          ... on NavigationLink {
            ...NavigationLinkFragment
          }
        }
      }
    }
    
    fragment NavigationBlogPostCardFragment on NavigationBlogPostCard {
      title {
        value
        jsonValue
      }
      description {
        value
        jsonValue
      }
      cta {
        value
        jsonValue
      }
      date {
        jsonValue
        value
      }
      tag {
        value
        jsonValue
      }
    }
    
    fragment NavigationContentBlockFragment on NavigationContentBlock {
      title {
        value
        jsonValue
      }
      description {
        value
        jsonValue
      }
      cta {
        value
        jsonValue
      }
      variant {
        targetItem {
          ...GenericSettingVariant
        }
      }
    }
    
    fragment GenericSettingVariant on GenericSetting {
      value {
        value
      }
    }
    
    fragment NavigationLinksListFragment on NavigationLinksList {
      title {
        value
        jsonValue
      }
      links {
        targetItems {
          ...NavigationLinkFragment
        }
      }
    }
    
    fragment NavigationLinkFragment on NavigationLink {
      link {
        value
        jsonValue
      }
    }
    
