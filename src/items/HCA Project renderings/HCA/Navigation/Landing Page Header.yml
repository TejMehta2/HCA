- ID: "17bb046a-a32a-41b3-8315-81217947611b"
  Hint: ComponentQuery
  Value: |
    query GetLandingPageHeader($datasource: String!, $language: String!) {
      item(path: $datasource, language: $language) {
        ... on LandingPageHeader {
          logo {
            jsonValue
          }
          text {
            jsonValue
          }
          anyQuestionsText {
            jsonValue
          }
          contactUnit {
            contactUnitList: targetItem {
              ...ContactUnitFields
            }
          }
        }
      }
    }
    
    fragment ContactUnitFields on ContactUnit {
      contactUnitName {
        value
      }
      telephoneNumber {
        telephoneNumberList: targetItems {
          ...TelephoneNumberFields
        }
      }
      children {
        results {
          ... on OpeningHours {
            ...OpeningHoursFields
          }
        }
      }
    }
    
    fragment OpeningHoursFields on OpeningHours {
      children {
        results {
          ... on OpeningHoursSpecification {
            dayOfWeek {
              dayOfWeekList: targetItems {
                ...DayOfWeekFields
              }
            }
            opens {
              value
            }
            closes {
              value
            }
            validFrom {
              value
            }
            validThrough {
              value
            }
          }
        }
      }
    }
    
    fragment DayOfWeekFields on DayOfWeek {
      dayName {
        value
      }
    }
    
    fragment TelephoneNumberFields on TelephoneNumber {
      internationPhoneNumber {
        value
      }
      phoneNumberLabel {
        value
      }
      phoneNumber {
        value
      }
    }
    
