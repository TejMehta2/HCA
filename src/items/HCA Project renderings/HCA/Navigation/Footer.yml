  Hint: ComponentQuery
  Value: |
    query GetFooter($datasource: String!, $language: String!) {
      item(path: $datasource, language: $language) {
        ...ItemFragment
        ... on Footer {
          logo {
            jsonValue
          }
    
          cqcStatus {
            targetItem {
              ...ItemFragment
              ... on CQC {
                title {
                  value
                }
                text {
                  value
                }
                reportLink {
                  jsonValue
                }
                status {
                  targetItem {
                    displayName
                    ...ItemFragment
                    ... on CQCStatus {
                      cQCLogoDark {
                        targetItem {
                          ... on CQCSettings {
                            logo {
                              jsonValue
                            }
                          }
                        }
                      }
                      cQCLogoLight {
                        targetItem {
                          ...ItemFragment
                          ... on CQCSettings {
                            logo {
                              jsonValue
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
    
          socialMediaProfilesGroup {
            targetItem {
              ...ItemFragment
              ... on SocialMediaProfilesFolder {
                profiles {
                  targetItems {
                    ...ItemFragment
                    ... on SocialMediaProfile {
                      profileUrl {
                        value
                      }
                      displayName
                      socialMediaProvider {
                        targetItem {
                          ...ItemFragment
                          ... on SocialMediaProvider {
                            icon: icon_41f62b60e9c24694b01dcd8f0e164351 {
                              targetItem {
                                ...ItemFragment
                                ... on HCAIcon {
                                  svgMarkup {
                                    value
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
    
          doctifyReviews {
            targetItem {
              ...ItemFragment
              ... on DoctifyReviews {
                doctifyLogoDark {
                  targetItem {
                    ...ItemFragment
                    ... on DoctifySettings {
                      logo {
                        jsonValue
                      }
                    }
                  }
                }
                doctifyLogoLight {
                  targetItem {
                    ...ItemFragment
                    ... on DoctifySettings {
                      logo {
                        jsonValue
                      }
                    }
                  }
                }
                reviews {
                  value
                }
                stars {
                  value
                }
                link {
                  jsonValue
                }
              }
            }
          }
    
          bottomLineLinksFolder {
            targetItem {
              ...ItemFragment
              ...NavigationLinksListFragment
            }
          }
    
          navigationColumnsFolders {
            targetItems {
              ...ItemFragment
              ...NavigationLinksListFragment
            }
          }
    
          copyright {
            value
          }
    
          contact {
            targetItem {
              ...ItemFragment
              ... on ContactUnit {
                contactUnitName {
                  value
                }
                telephoneNumber {
                  targetItems {
                    ...ItemFragment
                    ... on TelephoneNumber {
                      phoneNumber {
                        value
                      }
                      phoneNumberLabel {
                        value
                      }
                      internationPhoneNumber {
                        value
                      }
                    }
                  }
                }
              }
            }
          }
        }
      }
    }
    
    fragment ItemFragment on Item {
      id
      name
    }
    
    fragment NavigationLinkFragment on NavigationLink {
      displayName
      link {
        jsonValue
      }
    }
    
    fragment NavigationLinksListFragment on NavigationLinksList {
      title {
        value
      }
      links {
        targetItems {
          ...NavigationLinkFragment
        }
      }
    }
