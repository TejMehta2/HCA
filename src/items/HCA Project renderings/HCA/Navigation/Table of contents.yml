  Hint: ComponentQuery
  Value: |
    query SubNavigation($datasource: String!, $language: String!) {
      item(path: $datasource, language: $language) {
        ... on SubNavigation {
          title {
            jsonValue
          }
          defaultNavigationImage {
            jsonValue
          }
          includeRootPage {
           boolValue
          }
          rootPage {
            targetItem {
              ...navigableFragment
              ...basePageFragment
              children(hasLayout: true, first: 1000) {
                results {
                  ...navigableFragment
                  ...basePageFragment
                }
              }
            }
          }
        }
      }
    }
    
    fragment basePageFragment on _HCABasePage {
      title {
        value
      }
      abstractTitle {
        value
      }
      abstractImage {
        jsonValue
      }
      image {
        jsonValue
      }
    }
    
    fragment navigableFragment on Item {
      ... on _PageNavigable {
        navigationTitle {
          value
        }
        hideInSubNavigation {
          boolValue
        }
      }
      url {
        path
      }
      id
    }
    
