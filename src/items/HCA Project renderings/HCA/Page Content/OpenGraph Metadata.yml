  Hint: ComponentQuery
  Value: |
    query GetOpenGraphMetadata($datasource: String!, $contextItem: String!, $language: String!) {
      item(path: $datasource, language: $language) {
        ... on OpenGraphMetadata {
          defaultMetaImage {
            jsonValue
          }
          pageTitleSufix {
            jsonValue
          }
          twitterCard {
            jsonValue
          }
        }
      }
      contextItem: item(path: $contextItem, language: $language) {
        id
        ... on _HCABasePage {
          abstractTitle {
            jsonValue
          }
          abstractText {
            jsonValue
          }
          abstractImage {
            jsonValue
          }
          title {
            jsonValue
          }
          text {
            jsonValue
          }
          image {
            jsonValue
          }
          metaTitle {
            jsonValue
          }
          metaDescription {
            jsonValue
          }
          metaImage {
            jsonValue
          }
          noIndex {
            jsonValue
          }
          noFollow {
            jsonValue
          }
        }
      }
    }
    
