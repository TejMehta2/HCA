- ID: "17bb046a-a32a-41b3-8315-81217947611b"
  Hint: ComponentQuery
  Value: |
    query GetBlogDetailsHeader($contextItem: String!, $language: String!) {
      contextItem: item(path: $contextItem, language: $language) {
        name
        ... on BlogPage {
          title {
            jsonValue
          }
          text {
            jsonValue
          }
          date {
            jsonValue
          }
          lastChecked {
            jsonValue
          }
          authors {
            targetItems {
              ... on Author {
                name: name_dea163319c354ac99a6e81b11f81867a {
                  jsonValue
                }
                position {
                  jsonValue
                }
                avatar {
                  jsonValue
                }
                link {
                  jsonValue
                }
                positionLink {
                  jsonValue
                }
              }
            }
          }
          articleType {
            targetItem {
              ... on Tag {
                id
                title {
                  value
                }
              }
            }
          }
        }
      }
      settings: item(
        path: "/sitecore/content/HCA/HCA-Main/Data/Metadata/Default Metadata"
        language: $language
      ) {
        ... on Metadata {
          blogSearchResultsBaseUrl {
            jsonValue
          }
        }
      }
    }
    
