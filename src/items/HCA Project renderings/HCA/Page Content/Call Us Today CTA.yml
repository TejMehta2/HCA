- ID: "17bb046a-a32a-41b3-8315-81217947611b"
  Hint: ComponentQuery
  Value: |
    query GetCallUsTodayCTA($datasource: String!, $language: String!) {
      item(path: $datasource, language: $language) {
        ... on CallUsTodayCTA {
          cTAIcon {
            Icon: targetItem {
              ... on HCAIcon {
                svgMarkup {
                  value
                }
              }
            }
          }
          cTAText {
            jsonValue
          }
          contactUnit {
            contactUnitList: targetItems {
              ...ContactUnitFields
            }
          }
        }
      }
    }
    
    fragment ContactUnitFields on ContactUnit {
      contactUnitName {
        value
      }
      telephoneNumber {
        telephoneNumberList: targetItems {
          ...TelephoneNumberFields
        }
      }
      children {
        results {
          ... on OpeningHours {
            ...OpeningHoursFields
          }
        }
      }
    }
    
    fragment OpeningHoursFields on OpeningHours {
      children {
        results {
          ... on OpeningHoursSpecification {
            dayOfWeek {
              dayOfWeekList: targetItems {
                ...DayOfWeekFields
              }
            }
            opens {
              value
            }
            closes {
              value
            }
            validFrom {
              value
            }
            validThrough {
              value
            }
          }
        }
      }
    }
    
    fragment DayOfWeekFields on DayOfWeek {
      dayName {
        value
      }
    }
    
    fragment TelephoneNumberFields on TelephoneNumber {
      internationPhoneNumber {
        value
      }
      phoneNumberLabel {
        value
      }
      phoneNumber {
        value
      }
    }
