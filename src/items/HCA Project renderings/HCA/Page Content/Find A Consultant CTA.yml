- ID: "17bb046a-a32a-41b3-8315-81217947611b"
  Hint: ComponentQuery
  Value: |
    query GetFindAConsultantCTA($datasource: String!, $contextItem: String!, $language: String!
    ) {
      item(path: $datasource, language: $language) {
        ... on FindAConsultantCTA {
          cTAIcon {
            Icon: targetItem {
              ... on HCAIcon {
                svgMarkup {
                  value
                }
              }
            }
          }
          cTALink {
            jsonValue
          }
          practice {
            PracticeList: targetItems {
              doctifyPractice: field(name: "DoctifyPractice") {
                value
              }
            }
          }
          service {
            ServicesList: targetItems {
              doctifyKeywordId: field(name: "DoctifyKeywordId") {
                value
              }
            }
          }
          customFilters {
            CustomFiltersList: targetItems {
              filter: field(name: "Filter") {
                value
              }
              filterValueString: field(name: "FilterValueString") {
                value
              }
            }
          }
        }
      }
      contextItem: item(path: $contextItem, language: $language) {
        ... on SpecialtyPage {
          doctifyKeywordId {
            value
          }
        }
        ... on LocationPage {
          doctifyPractice {
            value
          }
        }
        ... on DiagnosisPage {
          doctifyKeywordId {
            value
          }
        }
        ... on TreatmentPage {
          doctifyKeywordId {
            value
          }
        }
        ... on ConditionPage {
          doctifyKeywordId {
            value
          }
        }
      }
    }
    
