- ID: "17bb046a-a32a-41b3-8315-81217947611b"
  Hint: ComponentQuery
  Value: |
    query GetDoctorCards($datasource: String!, $contextItem: String!, $language: String!) {
      item(path: $datasource, language: $language) {
        ... on DoctorCards {
          title {
            jsonValue
          }
          numberOfCards {
            jsonValue
          }
          cTACard {
            jsonValue
          }
          cTAIcon {
            Icon: targetItem {
              ... on HCAIcon {
                svgMarkup {
                  value
                }
              }
            }
          }
          cTALink {
            jsonValue
          }
          consultants {
            ConsultantsList: targetItems {
              ... on Consultant {
                displayName
                onlineBooking {
                  value
                }
                doctifySlug {
                  value
                }
              }
            }
          }
          practice {
            PracticeList: targetItems {
              doctifyPractice: field(name: "Doctify Practice") {
                value
              }
            }
          }
          service {
            ServicesList: targetItems {
              doctifyKeywordId: field(name: "Doctify KeywordId") {
                value
              }
            }
          }
          customFilters {
            CustomFiltersList: targetItems {
              ... on DoctifyFilter {
                filter {
                  value
                }
                filterValueString {
                  value
                }
              }
            }
          }
        }
      }
      contextItem: item(path: $contextItem, language: $language) {
        ... on SpecialtyPage {
          doctifyKeywordId {
            value
          }
        }
        ... on LocationPage {
          doctifyPractice {
            value
          }
        }
        ... on DiagnosisPage {
          doctifyKeywordId {
            value
          }
        }
        ... on TreatmentPage {
          doctifyKeywordId {
            value
          }
        }
      }
    }
    
