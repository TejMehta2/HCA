- ID: "17bb046a-a32a-41b3-8315-81217947611b"
  Hint: ComponentQuery
  Value: |
    query GetLocationMap(
      $datasource: String!
      $language: String!
    ) {
      item(path: $datasource, language: $language) {
        ... on LocationMap {
          cTACardText {
            jsonValue
          }
          getDirectionsText {
            jsonValue
          }
          locations {
            PagesList: targetItems {
              ...LocationPageMapFragment
              ...LocationProxyMapFragment
            }
          }
        }
      }
    }
    
    fragment LocationPageMapFragment on LocationPage {
      title {
        value
      }
      lat: latitude {
        value
      }
      lng: longitude {
        value
      }
      directions: getDirections {
        value
      }
      addressLine1 {
        value
      }
      addressLine2 {
        value
      }
      city {
        value
      }
      postCode {
        value
      }
      url {
        path: url
        url
      }
    }
    
    fragment LocationProxyMapFragment on LocationProxy {
      title {
        value
      }
      directions: getDirections {
        value
      }
      addressLine1 {
        value
      }
      addressLine2 {
        value
      }
      city {
        value
      }
      postCode {
        value
      }
      proxyurl: link {
        ... on LinkField {
          jsonValue
        }
      }
      url {
        path: url
        url
      }
    }

