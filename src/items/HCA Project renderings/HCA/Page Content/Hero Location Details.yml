  Hint: ComponentQuery
  Value: |
    query GetHeroLocationDetails($contextItem: String!, $language: String!) {
      contextItem: item(path: $contextItem, language: $language) {
        ... on LocationPage {
          title: field(name: "Title") {
            jsonValue
          }
          image {
            jsonValue
          }
          city {
            jsonValue
          }
          addressLine1 {
            jsonValue
          }
          addressLine2 {
            jsonValue
          }
          postCode {
            jsonValue
          }
          getDirections {
            jsonValue
          }
          doctifyReviews {
            fields: targetItem {
              ... on DoctifyReviews {
                Stars: field(name: "Stars") {
                  value
                }
                Reviews: field(name: "Reviews") {
                  value
                }
                DoctifyLogoLight: field(name: "DoctifyLogoLight") {
                  ...DoctifyLogoFields
                }
                DoctifyLogoDark: field(name: "DoctifyLogoDark") {
                  ...DoctifyLogoFields
                }
                Link: field(name: "Link") {
                 ... on LinkField {
                    url
                  }
                }
              }
            }
          }
          cQCRating {
            fields: targetItem {
              ... on CQC {
                Status: field(name: "Status") {
                  ...CQCStatusFields
                }
                Title: field(name: "Title") {
                  value
                }
                ReportLink: field(name: "ReportLink") {
                  ... on LinkField {
                    url
                  }
                }
                Text: field(name: "Text") {
                  value
                }
              }
            }
          }
          contactUnits {
            contactUnitList: targetItems {
              ...ContactUnitFields
            }
          }
        }
      }
    }
    
    fragment DoctifyLogoFields on LookupField {
      fields: targetItem {
        ... on DoctifySettings {
          Text: field(name: "Text") {
            value
          }
          Logo: field(name: "Logo") {
            fields: jsonValue
          }
        }
      }
    }
    
    fragment CQCStatusFields on LookupField {
      fields: targetItem {
        ... on CQCStatus {
          displayName
          Title: field(name: "Title") {
            value
          }
          Icon: field(name: "Icon") {
            value
          }
          CQCLogoLight: field(name: "CQCLogoLight") {
            ...CQCLogoFields
          }
          CQCLogoDark: field(name: "CQCLogoDark") {
            ...CQCLogoFields
          }
        }
      }
    }
    
    fragment CQCLogoFields on LookupField {
      fields: targetItem {
        ... on CQCSettings {
          Logo: field(name: "Logo") {
            fields: jsonValue
          }
        }
      }
    }
    
    fragment ContactUnitFields on ContactUnit {
      contactUnitName {
        value
      }
      telephoneNumber {
        telephoneNumberList: targetItems {
          ...TelephoneNumberFields
        }
      }
      children {
        results {
          ... on OpeningHours {
            ...OpeningHoursFields
          }
        }
      }
    }
    
    fragment OpeningHoursFields on OpeningHours {
      children {
        results {
          ... on OpeningHoursSpecification {
            dayOfWeek {
              dayOfWeekList: targetItems {
                ...DayOfWeekFields
              }
            }
            opens {
              value
            }
            closes {
              value
            }
            validFrom {
              value
            }
            validThrough {
              value
            }
          }
        }
      }
    }
    
    fragment DayOfWeekFields on DayOfWeek {
      dayName {
        value
      }
    }
    
    fragment TelephoneNumberFields on TelephoneNumber {
      internationPhoneNumber {
        value
      }
      phoneNumberLabel {
        value
      }
      phoneNumber {
        value
      }
    }
    
