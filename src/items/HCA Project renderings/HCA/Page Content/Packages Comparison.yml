- ID: "17bb046a-a32a-41b3-8315-81217947611b"
  Hint: ComponentQuery
  Value: |
    query GetPackageComparisonCards($datasource: String!, $language: String!) {
      item(path: $datasource, language: $language) {
        ... on PackagesComparison {
          heading {
            jsonValue
          }
          title {
            jsonValue
          }
          text {
            jsonValue
          }
    
          packages {
            targetItems {
              ... on PackageCard {
                title {
                  jsonValue
                }
                description {
                  jsonValue
                }
                featuresLabel {
                  jsonValue
                }
                cTA {
                  jsonValue
                }
                tag {
                  jsonValue
                }
                alternativeTagVariant {
                  value
                  boolValue
                }
                pricingVariants {
                  targetItems {
                    ... on PricingVariant {
                      price {
                        jsonValue
                      }
                      discount {
                        jsonValue
                      }
                      period {
                        jsonValue
                      }
                    }
                  }
                }
                includedPackageItems {
                  targetItems {
                    ...PackageFeatureItemFragment
                  }
                }
                excludedPackageItems {
                  targetItems {
                    ...PackageFeatureItemFragment
                  }
                }
              }
            }
          }
        }
      }
    }
    
    fragment PackageFeatureItemFragment on PackageFeatureItem {
      label {
        value
      }
      summary {
        value
      }
      info {
        value
      }
    }
    
