    query GetIntroBlock($datasource: String!, $language: String!) {
      item(path: $datasource, language: $language) {
        ... on IntroBlock {
          
          ...CtaBaseFragment
    
          headline {
            jsonValue
          }
          title {
            jsonValue
          }
          text {
            jsonValue
          }
          image {
            jsonValue
          }
          counters {
            targetItems {
              ...ScoresFragment
            }
          }
          cQCStatus {
            targetItem {
              ... on CQC {
                title {              
                  value
                }
                text {             
                  value
                }
                reportLink {
                  jsonValue
                }
                status {
                  targetItem {
                    ... on CQCStatus {
                      title {
                        value
                      }
                      icon: icon_f7469f76595c49ccb0cc66a5e3d33383 {
                        value
                      }
                      cQCLogoLight {
                        targetItem {
                          ...CQCSettingsFragment
                        }
                      }
                      cQCLogoDark {
                        targetItem {
                          ...CQCSettingsFragment
                        }
                      }
                    }
                  }
                }
              }
            }
          }
    
          doctifyReviews {
            targetItem {
              ... on DoctifyReviews {
                stars {
                  value
                }
                reviews {
                  value
                }
                link {
                  jsonValue
                }
                doctifyLogoLight {
                  targetItem {
                    ...DoctifySettingsFragment
                  }
                }
                doctifyLogoLight {
                  targetItem {
                    ...DoctifySettingsFragment
                  }
                }
              }
            }
          }
        }
      }
    }
    
    fragment CtaBaseFragment on _CTABase {
      cTAIcon {
        targetItem {
          ... on HCAIcon {
            svgMarkup {
              value
            }
          }
        }
      }
      cTALink {
        jsonValue
      }
    }
    
    fragment ScoresFragment on Scores {
      number {
        jsonValue
      }
      text {
        jsonValue
      }
    }
    
    fragment CQCSettingsFragment on CQCSettings {
      logo {
        jsonValue
      }
    }
    
    fragment DoctifySettingsFragment on DoctifySettings {
      text {
        jsonValue
      }
      logo {
        jsonValue
      }
    }
    
