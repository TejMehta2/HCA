- ID: "17bb046a-a32a-41b3-8315-81217947611b"
  Hint: ComponentQuery
  Value: |
    query GetLocationCards(
      $datasource: String!
      $contextItem: String!
      $language: String!
    ) {
      item(path: $datasource, language: $language) {
        ... on LocationCards {
          heading {
            jsonValue
          }
          title {
            jsonValue
          }
          text {
            jsonValue
          }
          cTAIcon {
            Icon: targetItem {
              ... on HCAIcon {
                svgMarkup {
                  value
                }
              }
            }
          }
          cTALink {
            jsonValue
          }
          locations {
            PagesList: targetItems {
              ...LocationPageFragment
            }
          }
          filterOptions {
            filterOptionsList: targetItems {
              ... on FilterOption {
                displayName: field(name: "DisplayName") {
                  value
                }
                filter {
                  value
                }
                filterValueString {
                  value
                }
                filterValueGuid {
                  targetItem {
                    id
                  }
                }
              }
            }
          }
          cTAText {
            jsonValue
          }
          getDirectionsText {
            jsonValue
          }
          numberOfCards {
            jsonValue
          }
        }
      }
      contextItemSearchIdParams: item(path: $contextItem, language: $language) {
        ... on TreatmentPage {
          treatmentId: id
        }
        ... on SpecialtyPage {
          serviceLineId: id
        }
        ... on DiagnosisPage {
          scanId: id
        }
        ... on ConditionPage {
          conditionId: id
        }
      }
      contextItem: item(path: $contextItem, language: $language) {
        ... on _locationsSelector {
          locations {
            targetItems {
              ...LocationPageFragment
            }
          }
        }
      }
    }
    
    fragment LocationPageFragment on LocationPage {
      abstractTitle {
        value
      }
      abstractImage {
        jsonValue
      }
      title {
        value
      }
      image {
        jsonValue
      }
      city {
        value
      }
      addressLine1 {
        value
      }
      addressLine2 {
        value
      }
      postCode {
        value
      }
      getDirections {
        value
      }
      url {
        path: url
        url
      }
    }
    
