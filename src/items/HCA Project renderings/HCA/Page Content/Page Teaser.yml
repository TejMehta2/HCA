  Hint: ComponentQuery
  Value: |
    query GetPageTeaser($datasource: String!, $language: String!) {
      item(path: $datasource, language: $language) {
        ... on _Abstracts {
          abstractTitle {
            value
          }
          abstractText {
            value
          }
          abstractImage {
            jsonValue
          }
        }
        ... on _HCABasePageData {
          title {
            value
          }
          text {
            value
          }
          image {
            jsonValue
          }
        }
        ... on PageProxy {
          proxyurl: link {
            ... on LinkField {
              path: url
              text
              jsonValue
            }
          }
        }
        ... on _HCABasePage {
          ... on Item {
            url {
              path
              url
            }
          }
        }
      }
    }
