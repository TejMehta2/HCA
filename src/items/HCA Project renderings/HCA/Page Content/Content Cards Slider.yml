  Hint: ComponentQuery
  Value: |
    query GetContentCardSlider( $datasource: String!, $language: String!) 
    {
        item(path: $datasource, language: $language) {
        ...on ContentCardsSlider {
              Heading : field(name:"Heading"){value},
              Title : field(name:"Title"){value},
              CTACardText : field(name:"CTA Card Text"){value},
          	  CTAIcon : icon_dc1f5853348248dc8a23eb4ec1115f01
          	  {
                Icon: targetItem
                {      		
              	... on HCAIcon
                  {
                    SVGMarkup : field(name:"SVG Markup"){value}
                  }
                }
              },
              CTALink : field(name:"CTA Link"){...on LinkField{url, text}},
              pages
                {
                   PagesList: targetItems
                    {
                      Title : field(name:"Title"){value},
                      Description : field(name:"Description"){value},
                      Image : field(name:"Image"){...on ImageField{src, alt, height, width}},
                      ... on LocationPage
                      {
                        url { path },
                      }
                      ... on BlogPage
                      {
                        url { path },
                      }
                      ... on PatientStories
                      {
                        url { path },
                      }
                      ... on ServicePage
                      {
                        url { path },
                      }
                      ... on PageProxy
                      {
              	    Link : field(name:"Link"){...on LinkField{url}}
                      }
                    }
                }
              }
     	}
    }
    
    
