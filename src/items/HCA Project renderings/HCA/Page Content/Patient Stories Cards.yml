              ... on FilterOption {
                displayName: field(name: "DisplayName") {
                  value
                }
                filter {
                  value
                }
                filterValueString {
                  value
                }
                filterValueGuid {
                  targetItem {
                    id
                  }
                }
              }
            }
          }
          filterOptions {
            filterOptionsList: targetItems {
              ... on FilterOption {
                displayName: field(name: "DisplayName") {
                  value
                }
                filter {
                  value
                }
                filterValueString {
                  value
                }
                filterValueGuid {
                  targetItem {
                    id
                  }
                }
              }
            }
          }
          cTAText {
            jsonValue
          }
          numberOfCards {
            jsonValue
          }
        }
      }
      contextItemSearchParams: item(path: $contextItem, language: $language) {
        ... on PatientStoryPage {
          serviceLineId: field(name: "Speciality") {
            value
          }
          locationId: field(name: "Facility") {
            value
          }
        }
      }
      contextItemSearchIdParams: item(path: $contextItem, language: $language) {
        ... on SpecialtyPage {
          serviceLineId: id
        }
        ... on LocationPage {
          locationId: id
        }
      }
    }
    
