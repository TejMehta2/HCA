        <p>&ldquo;This has been a brilliant place to refresh my skills because there's such a diverse range of advanced care.</p>
        <p>
        The high standards are inspiring - every day, I want to improve.</p>
        <p>
        HCA UK aren't just employing me during the 'Return to Practice' programme, they're also covering the fees. As soon as I get my Nursing and Midwifery Council (NMC) PIN, I'll be able to start as a permanent staff nurse.</p>
        <p>
        The incredible support is the main reason I'd encourage people to apply.&rdquo;</p>
