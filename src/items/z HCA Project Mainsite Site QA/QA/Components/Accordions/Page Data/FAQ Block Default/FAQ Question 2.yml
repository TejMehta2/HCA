      Hint: Answer
      Value: |
        <p>A PCI usually takes between one and two hours, although sometimes it can take longer. The typical PCI procedure steps are as follows:</p>
        <ul class="tick">
        <li>You’ll be given a local anaesthetic to numb your groin or wrist. You may also be given a sedative to help you relax.</li>
        <li>A small tube will be inserted into your artery. A catheter is then placed inside that tube.</li>
        <li>The catheter will have a small, deflated balloon attached to it. This is guided into place using an X-ray.</li>
        <li>The balloon is inflated, which opens your artery.</li>
        <li>A stent, made of wire mesh, will be inserted to keep the artery open.</li>
        <li>The balloon and catheter are then removed, leaving the stent in position.</li>
        </ul>
