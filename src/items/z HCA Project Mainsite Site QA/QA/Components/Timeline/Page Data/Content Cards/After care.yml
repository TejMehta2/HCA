    - ID: "77332344-9643-4f3c-96fc-e015f6b423de"
      Hint: Text
      Value: |
        <p>If you do stay overnight, you should be able to return home the next day. You won&rsquo;t be able to drive for at least a week, so you'll need to arrange for someone to help with your transport.</p>
        <p>You can expect to have a bit of bruising or soreness where the catheter was inserted, but please get in touch if it gets worse, starts to swell or if you get a temperature.</p>
        <p>We&rsquo;ll also prescribe medication to help with your recovery, including aspirin to reduce the risk of blood clots, and statins to lower your cholesterol.</p>
