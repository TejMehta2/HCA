      Value: |
        <p>While some patients are given a local anaesthetic, others will have a general anaesthetic, which means they&rsquo;ll be asleep for the procedure. If you have a local anaesthetic, you may also be given a sedative to help you relax.</p>
        <p>After your PCI, you may be able to go home the same day. However, if you do stay overnight, you'll be well looked after in one of our beautiful, comfortable rooms.&nbsp;</p>
