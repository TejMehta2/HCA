      Hint: Text
      Value: |
        <p>From the moment you step through the door, until the time you&rsquo;re ready to leave, we want you to feel as comfortable as possible with us, every step of the way.</p>
        <p>Along with state-of-the-art treatment and luxurious surroundings, one of the ways we can put you at ease is to prepare you for your visit and let you know what to expect at each stage.</p>
        <p>If you have any questions that aren&rsquo;t answered here, or in the FAQ section below, please don&rsquo;t hesitate to get in touch. Our team will be happy to help in any way they can.</p>
