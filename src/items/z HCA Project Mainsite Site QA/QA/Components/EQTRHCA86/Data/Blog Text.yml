        <h1>"Nothing but excellent"</h1>
        <p>The CQC highlighted a "strong, visible person-centred culture" at London Bridge Hospital, where colleagues are highly motivated to offer kind and compassionate care. According to the report, relatives of patients described staff as &ldquo;nothing but excellent&rdquo; and found them to be very caring and "always smiling".
        </p>
        <p>After inspecting the hospital&rsquo;s level 3 22- bed Critical Care Unit,&nbsp; the CQC also noted that staff were "proud to work in critical care", "enthusiastic about the care and services they provided", and "felt valued and supported by the team members and management."</p>
        <p>
        Looking more closely at leadership, the CQC reported that London Bridge Hospital&rsquo;s leadership team "demonstrated high levels of experience and capability to deliver sustainable care". Staff spoke highly of management, commenting on the "friendliness and visibility of the senior leaders" and stating that "leaders demonstrated a passion for developing, upskilling and supporting staff."
        </p>
        <p>In addition to championing London Bridge Hospital&rsquo;s staff and leadership, the CQC also complimented its patient-centred processes and initiatives, including;
        </p>
        <ul>
            <li>the 24-hour, 7 day a week medical concierge and triage service, which accepted urgent, unplanned admissions into London Bridge Hospit
            </li>
            <li>the development of a bespoke pain scoring tool for liver transplant patients,
            </li>
            <li>and the hospital&rsquo;s commitment to ensuring international patients from all over the world had their needs met, by providing carers with the same cultural and religious orientation who could relate to a patient needs and reassure them and their families.</li>
        </ul>
